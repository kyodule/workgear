name: "openspec-dev-pipeline-v2"
version: "2.0"
description: "优化版 Spec 驱动开发流水线：增加需求理解与确认环节，避免理解偏差导致的推翻重来"

variables:
  project_id: ""
  requirement_text: ""

nodes:
  # ─── 阶段 1：提交需求 ───
  - id: submit_requirement
    name: "提交需求"
    type: human_input
    config:
      form:
        - field: requirement_text
          type: textarea
          label: "需求描述"
          required: true
        - field: priority
          type: select
          label: "优先级"
          options: ["P0", "P1", "P2", "P3"]
          required: false

  # ─── 阶段 2：需求理解（新增）───
  - id: understand_requirement
    name: "理解需求"
    type: agent_task
    agent:
      role: "requirement-analyst"
    config:
      mode: understand
      transient: true
      prompt_template: |
        请快速理解以下需求，输出 Markdown 格式的理解文档（200-500 字）：
        
        需求：{{nodes.submit_requirement.outputs.requirement_text}}
        优先级：{{nodes.submit_requirement.outputs.priority}}
        
        输出格式：
        # 需求理解
        
        ## 核心目标
        （一句话概括）
        
        ## 关键点
        - 点1
        - 点2
        - 点3
        
        ## 影响范围
        - 涉及的文件/模块
        
        ## 技术方案（初步）
        （简要说明）
        
        ## 风险点
        （如果有）
        
        ⚠️ 重要：
        - 你有 10 分钟完成
        - 不要生成完整的 Spec，只需要理解摘要
        - 不要深入分析代码，只需要列出关键文件
        - 如果不确定，标注"待确认"并继续

  # ─── 阶段 3：需求确认（新增）───
  - id: confirm_understanding
    name: "确认需求理解"
    type: human_review
    config:
      timeout: 10m
      editable: true
      editable_fields:
        - understanding_md
      actions: ["approve", "reject"]
    on_reject:
      goto: understand_requirement
      max_loops: 3
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 4：自动生成变更名称 ───
  - id: generate_change_name
    name: "生成变更名称"
    type: agent_task
    agent:
      role: "spec-architect"
    config:
      mode: generate_change_name
      prompt_template: |
        根据以下需求理解，生成一个简短的英文变更名称（slug 格式，用连字符分隔）。

        需求理解：
        {{nodes.confirm_understanding.outputs.confirmed_understanding}}

        要求：
        - 只输出变更名称，不要其他内容
        - 全小写，单词用连字符分隔
        - 简洁准确，不超过5个单词
        - 不要包含 feat/fix 等前缀
      timeout: 5m

  # ─── 阶段 5：Agent 生成 Spec ───
  - id: generate_spec
    name: "生成 OpenSpec"
    type: agent_task
    agent:
      role: "{{params.spec_role}}"
    config:
      mode: opsx_plan
      timeout: 30m
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
        schema: "{{params.spec_schema}}"
        init_if_missing: true
      prompt_template: |
        基于以下需求理解，使用 OpenSpec 工作流生成完整的规划文档：

        ## 需求理解（已确认）
        {{nodes.confirm_understanding.outputs.confirmed_understanding}}

        ## Change Name
        {{nodes.generate_change_name.outputs.change_name}}

        你需要：
        1. 创建 OpenSpec change: {{nodes.generate_change_name.outputs.change_name}}
        2. 生成 proposal.md（为什么做、做什么、影响范围）
        3. 生成 delta specs：
           - 目录结构镜像 openspec/specs/ 的模块分类
           - 文件名格式：<PREFIX>-YYYY-MM-DD-<capability>.md
           - PREFIX 为 ADDED（新增功能）/ MODIFIED（修改现有功能）/ REMOVED（删除功能）
           - 使用 Given/When/Then 格式描述场景
        4. 生成 design.md（技术方案、数据流、文件变更清单）
        5. 生成 tasks.md（按模块分组的实施任务清单，使用 [ ] 复选框格式）

        ⚠️ 重要：
        - 你有 30 分钟完成
        - 请直接生成 OpenSpec 产物，不要重新分析需求
        - 需求理解已经过人工确认，请严格按照理解的内容生成 Spec

        请确保所有文件保存到 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/ 目录下。
      retry:
        max_attempts: 2
        backoff: exponential

  # ─── 阶段 6：人工 Review Spec ───
  - id: review_spec
    name: "审核 Spec"
    type: human_review
    config:
      timeout: 30m
      review_target: "{{nodes.generate_spec.outputs}}"
      show_artifacts: true
      artifact_paths:
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/proposal.md"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/design.md"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/tasks.md"
      actions: ["approve", "reject"]
    on_reject:
      goto: generate_spec
      max_loops: "{{params.max_spec_review_loops}}"
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 7：Agent 实施代码 ───
  - id: implement_code
    name: "实施代码"
    type: agent_task
    agent:
      role: "{{params.developer_role}}"
    config:
      mode: opsx_apply
      timeout: 60m
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
      prompt_template: |
        请按照 OpenSpec 的规划文档实施所有任务。

        变更名称：{{nodes.generate_change_name.outputs.change_name}}
        Spec 文档目录：openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/

        实施步骤：
        1. 首先读取以下文件了解完整的实施要求：
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/tasks.md（任务清单）
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/design.md（技术方案和代码示例）
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/ 目录下所有文件（场景定义）
        2. 按 tasks.md 中的顺序逐项实施，每完成一项在 tasks.md 中标记 [x]
        3. 严格按照 design.md 中的技术方案和代码示例实现
        4. 确保实现覆盖 specs 中定义的所有场景
        5. 所有变更完成后执行 git add -A

        ⚠️ 重要：
        - 你有 60 分钟完成
        - 项目使用 pnpm workspace 管理依赖，优先使用 pnpm
        - 如果某个工具不可用，可以自行安装或使用替代方案，但必须继续完成后续任务
        - 不要因为某一步遇到问题就停止，尝试解决后继续

        验收标准：
        - tasks.md 中所有任务项都已标记 [x]
        - design.md 中列出的所有新增文件都已创建
        - design.md 中列出的所有修改文件都已更新
      git:
        create_branch: true
        branch_pattern: "feat/{{nodes.generate_change_name.outputs.change_name}}"
        auto_commit: true

  # ─── 阶段 8：代码审核 ───
  - id: code_review
    name: "代码审核"
    type: human_review
    config:
      timeout: 30m
      review_target: "{{nodes.implement_code.outputs}}"
      show_artifacts: true
      artifact_paths:
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/"
      actions: ["approve", "reject"]
    on_reject:
      goto: implement_code
      max_loops: "{{params.max_code_review_loops}}"
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 9：最终审核 ───
  - id: final_review
    name: "最终审核"
    type: human_review
    config:
      timeout: 30m
      review_target: "{{nodes.code_review.outputs}}"
      show_artifacts: true
      actions: ["approve", "reject"]
    on_reject:
      goto: implement_code
      max_loops: 2
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 10：归档 Spec ───
  - id: archive_spec
    name: "归档 Spec"
    type: agent_task
    agent:
      role: "{{params.spec_role}}"
    config:
      mode: opsx_plan
      timeout: 10m
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
        action: archive
      prompt_template: |
        请归档已完成的 OpenSpec 变更：{{nodes.generate_change_name.outputs.change_name}}

        操作步骤：
        1. 读取 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/ 下的所有 delta spec 文件
        2. 按照目录结构和文件前缀处理：
           - ADDED-* 文件：去掉 ADDED- 前缀，复制到 openspec/specs/ 对应目录
           - MODIFIED-* 文件：去掉 MODIFIED- 前缀，覆盖 openspec/specs/ 对应文件
           - REMOVED-* 文件：删除 openspec/specs/ 对应文件（文件名去掉 REMOVED- 前缀）
        3. 将 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/ 移动到 openspec/changes/archive/
        4. 确保 openspec/specs/ 中的内容是最新的完整规范

edges:
  - from: submit_requirement
    to: understand_requirement
  - from: understand_requirement
    to: confirm_understanding
  - from: confirm_understanding
    to: generate_change_name
  - from: generate_change_name
    to: generate_spec
  - from: generate_spec
    to: review_spec
  - from: review_spec
    to: implement_code
  - from: implement_code
    to: code_review
  - from: code_review
    to: final_review
  - from: final_review
    to: archive_spec
