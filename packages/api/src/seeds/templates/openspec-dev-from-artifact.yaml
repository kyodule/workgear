name: "openspec-dev-from-artifact"
version: "1.0"
description: "从 User Story 产物生成完整 OpenSpec 后实施（完整流程）"

variables:
  project_id: ""
  selected_stories: ""

nodes:
  # ─── 阶段 1：加载产物 ───
  - id: load_artifact
    name: "加载产物"
    type: system_init
    config:
      output_from_variables:
        - key: user_stories
          variable: selected_stories

  # ─── 阶段 2：自动生成变更名称 ───
  - id: generate_change_name
    name: "生成变更名称"
    type: agent_task
    agent:
      role: "spec-architect"
    config:
      mode: generate_change_name
      prompt_template: |
        根据以下 User Stories，生成一个简短的英文变更名称（slug 格式，用连字符分隔）。

        User Stories：
        {{nodes.load_artifact.outputs.user_stories}}

        要求：
        - 只输出变更名称，不要其他内容
        - 全小写，单词用连字符分隔
        - 简洁准确，不超过5个单词
        - 不要包含 feat/fix 等前缀
      timeout: 5m

  # ─── 阶段 3：Agent 生成 Spec ───
  - id: generate_spec
    name: "生成 OpenSpec"
    type: agent_task
    agent:
      role: "spec-architect"
    config:
      mode: opsx_plan
      timeout: 30m
      git:
        create_branch: true
        branch_pattern: "feat/{{nodes.generate_change_name.outputs.change_name}}"
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
        schema: "v1"
        init_if_missing: true
      prompt_template: |
        {% if review.comment %}
        ## ⚠️ 审核打回意见
        上一版本的 Spec 被打回，原因如下：

        {{review.comment}}

        请根据以上意见重新生成 OpenSpec 文档，确保解决所有提出的问题。

        ---
        {% endif %}

        基于以下 User Stories，使用 OpenSpec 工作流生成完整的规划文档：

        ## User Stories
        {{nodes.load_artifact.outputs.user_stories}}

        ## Change Name（变更标识符）
        本次变更的唯一标识符为：{{nodes.generate_change_name.outputs.change_name}}

        你需要：
        1. 创建 OpenSpec change 目录：openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/
        2. 生成 proposal.md（为什么做、做什么、影响范围）
        3. 生成 delta specs：
           - 每个 spec 文件开头必须包含元数据块，格式如下：
             > **Type:** ADDED/MODIFIED/REMOVED
             > **Module:** <模块名>
             > **Date:** YYYY-MM-DD
             > **Change:** {{nodes.generate_change_name.outputs.change_name}}
           - 目录结构镜像 openspec/specs/ 的模块分类
           - 文件名格式：<PREFIX>-YYYY-MM-DD-<capability>.md
           - PREFIX 为 ADDED（新增功能）/ MODIFIED（修改现有功能）/ REMOVED（删除功能）
           - 使用 Given/When/Then 格式描述场景
        4. 生成 design.md（技术方案、数据流、文件变更清单）
        5. 生成 tasks.md（按模块分组的实施任务清单，使用 [ ] 复选框格式）

        ⚠️ 重要：
        - User Stories 已包含验收标准和技术实现要点，请直接基于这些内容生成 Spec
        - 在所有 spec 文件的 `> **Change:**` 字段中，必须使用变更标识符的原始值：{{nodes.generate_change_name.outputs.change_name}}
        - 不要修改或添加任何前缀，直接使用这个值

        请确保所有文件保存到 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/ 目录下。
      retry:
        max_attempts: 2
        backoff: exponential

  # ─── 阶段 4：人工 Review Spec ───
  - id: review_spec
    name: "审核 Spec"
    type: human_review
    config:
      timeout: 24h
      review_target: "{{nodes.generate_spec.outputs}}"
      show_artifacts: true
      artifact_paths:
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/proposal.md"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/design.md"
        - "openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/tasks.md"
      actions: ["approve", "reject"]
      artifact_scope: predecessor
    on_reject:
      goto: generate_spec
      max_loops: 3
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 5：Agent 实施代码 ───
  - id: implement_code
    name: "实施代码"
    type: agent_task
    agent:
      role: "general-developer"
    config:
      mode: opsx_apply
      timeout: 60m
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
      prompt_template: |
        {% if review.comment %}
        ## ⚠️ 审核打回意见
        上一版本的代码实施被打回，原因如下：

        {{review.comment}}

        请根据以上意见重新实施代码，确保解决所有提出的问题。

        ---
        {% endif %}

        请按照 OpenSpec 的规划文档实施所有任务。

        变更名称：{{nodes.generate_change_name.outputs.change_name}}
        Spec 文档目录：openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/

        实施步骤：
        1. 首先读取以下文件了解完整的实施要求：
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/tasks.md（任务清单）
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/design.md（技术方案和代码示例）
           - openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/ 目录下所有文件（场景定义）
        2. 按 tasks.md 中的顺序逐项实施，每完成一项在 tasks.md 中标记 [x]
        3. 严格按照 design.md 中的技术方案和代码示例实现
        4. 确保实现覆盖 specs 中定义的所有场景
        5. 所有变更完成后执行 git add -A

        ⚠️ 重要：
        - 项目使用 pnpm workspace 管理依赖，优先使用 pnpm
        - 如果某个工具不可用，可以自行安装或使用替代方案，但必须继续完成后续任务
        - 不要因为某一步遇到问题就停止，尝试解决后继续

        验收标准：
        - tasks.md 中所有任务项都已标记 [x]
        - design.md 中列出的所有新增文件都已创建
        - design.md 中列出的所有修改文件都已更新
      git:
        create_branch: true
        branch_pattern: "feat/{{nodes.generate_change_name.outputs.change_name}}"
        auto_commit: true

  # ─── 阶段 6：Agent 代码审核 ───
  - id: code_review
    name: "Agent 代码审核"
    type: agent_task
    agent:
      role: "code-reviewer"
    config:
      mode: code_review
      transient: true
      prompt_template: |
        请 Review 以下代码变更，对照 OpenSpec 的 specs 和 design 文档：

        变更名称：{{nodes.generate_change_name.outputs.change_name}}
        Spec 文档目录：openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/

        检查维度：
        1. 完整性：所有 tasks.md 中的任务是否都已实施
        2. 正确性：实施是否符合 specs 中的需求和场景
        3. 一致性：代码是否符合 design.md 中的技术方案
        4. 代码质量：可维护性、安全性、性能
      timeout: 10m

  # ─── 阶段 7：最终审核 ───
  - id: final_review
    name: "最终审核"
    type: human_review
    config:
      timeout: 24h
      review_target: "{{nodes.code_review.outputs}}"
      show_artifacts: true
      actions: ["approve", "reject"]
      artifact_scope: predecessor
    on_reject:
      goto: implement_code
      max_loops: 3
      inject:
        feedback: "{{review.comment}}"

  # ─── 阶段 8：归档 Spec ───
  - id: archive_spec
    name: "归档 Spec"
    type: agent_task
    agent:
      role: "spec-architect"
    config:
      mode: opsx_plan
      timeout: 10m
      git:
        create_branch: true
        branch_pattern: "feat/{{nodes.generate_change_name.outputs.change_name}}"
      opsx:
        change_name: "{{nodes.generate_change_name.outputs.change_name}}"
        action: archive
      prompt_template: |
        请归档已完成的 OpenSpec 变更：{{nodes.generate_change_name.outputs.change_name}}

        操作步骤：
        1. 读取 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/specs/ 下的所有 delta spec 文件
        2. 按照目录结构和文件前缀处理：
           - ADDED-* 文件：去掉 ADDED- 前缀，复制到 openspec/specs/ 对应目录
           - MODIFIED-* 文件：去掉 MODIFIED- 前缀，覆盖 openspec/specs/ 对应文件
           - REMOVED-* 文件：删除 openspec/specs/ 对应文件（文件名去掉 REMOVED- 前缀）
        3. 将 openspec/changes/{{nodes.generate_change_name.outputs.change_name}}/ 移动到 openspec/changes/archive/
        4. 确保 openspec/specs/ 中的内容是最新的完整规范

edges:
  - from: load_artifact
    to: generate_change_name
  - from: generate_change_name
    to: generate_spec
  - from: generate_spec
    to: review_spec
  - from: review_spec
    to: implement_code
  - from: implement_code
    to: code_review
  - from: code_review
    to: final_review
  - from: final_review
    to: archive_spec
